# Spotify Playlist Scraper — Configuration
# Copy to config.yaml and fill in your credentials before running.

spotify:
  # Create an app at https://developer.spotify.com/dashboard
  client_id:     "cb31b1954a20432384b9b16896915fde"
  client_secret: "909402d5a90943dba5a8ed35bdfae146"
  redirect_uri:  "http://127.0.0.1:8888/callback"
  # spotipy caches the OAuth token here so you only log in once.
  cache_path:    ".spotify_cache"

jellyfin:
  url: "http://localhost:8096"
  # Dashboard → Advanced → API Keys → [+]
  api_key: "ffeb6e7bac8e473b9c55d8340aec4e29"
  # Dashboard → Users → click your user → copy the UUID from the URL bar
  user_id: "connor"

slskd:
  url: "http://localhost:5030"
  # Set in slskd's appsettings.yml under  security > apiKeys
  api_key: "YOUR_SLSKD_API_KEY"
  # Host path where slskd saves completed downloads.
  # Must be the path as seen by THIS script, not inside the Docker container.
  download_dir: 'E:\The Keep\Music'
  # Seconds to wait for Soulseek search results before giving up.
  search_timeout: 30
  # Maximum number of result files to evaluate per search.
  result_limit: 100

library:
  # Root directory of your Jellyfin music library (as seen by THIS script).
  music_dir: "./music"
  # Accepted audio formats, checked in order.
  accepted_formats:
    - flac
    - mp3
  # Reject MP3 files below this bitrate (kbps).
  min_mp3_bitrate: 320
  # When both FLAC and MP3 exist, prefer FLAC.
  prefer_flac: true
  # Seconds to wait after triggering a Jellyfin library refresh before
  # searching for the newly added track.
  scan_wait: 15
  # Seconds between slskd transfer status polls.
  download_poll_interval: 5
  # Maximum seconds to wait for a single file to finish downloading.
  download_timeout: 600
